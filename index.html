            flex-direction: column;
        }

            height: 28px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 0 24px 8px;
        }

        .notch-inner {
            width: 130px;
            height: 20px;
            background: #000;
            border-radius: 0 0 24px 24px;
        }

        .screen {
            flex: 1;
            background: linear-gradient(180deg, #0a0a15 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .decorative-cross {
            position: absolute;
            font-size: 200px;
            opacity: 0.05;
            z-index: 0;
        }

        .cross-top {
            top: -50px;
            right: -50px;
        }

        .cross-bottom {
            bottom: -50px;
            left: -50px;
        }

        .screen > * {
            position: relative;
            z-index: 1;
        }

        .time-section {
            text-align: center;
            margin-bottom: 16px;
        }

        .time-display {
            font-size: 56px;
            font-weight: 300;
            letter-spacing: 0.02em;
            font-variant-numeric: tabular-nums;

        }

        .date-display {
            font-size: 13px;
            color: #999;
            letter-spacing: 0.02em;
        }

            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }

            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

        .cross-icon {
            font-size: 32px;
            margin-bottom: 12px;
            display: block;
        }

        .quote-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 16px;
            color: #fef3c7;
            letter-spacing: 0.3px;
        }

        .quote-source {
            font-size: 12px;
            color: #a0a0a0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .quote-type {
            font-size: 11px;
            color: #60a5fa;
            margin-top: 8px;
            font-style: italic;
        }

        .next-quote-preview {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(111, 111, 111, 0.5);
            font-size: 12px;
            color: #a0a0a0;
        }

        .next-quote-preview-label {
            color: #888;
            margin-bottom: 8px;
            display: block;
        }

            font-style: italic;
            line-height: 1.4;

            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .actions-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;

            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            text-align: center;

            color: white;

            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

            opacity: 0.5;
            cursor: not-allowed;
        }

        .update-notice {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }

            border-radius: 16px;
            padding: 16px;
            text-align: center;
            margin-top: 16px;

            height: 20px;

        }

            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .phone-frame {
                border-radius: 36px;

            .time-display {
                font-size: 48px;
            }

            .quote-text {

            }

            .screen {
                padding: 20px;
            }

        :root {
            color-scheme: dark;
        }

        @media (orientation: landscape) and (max-height: 600px) {
            .phone-frame {

            }

            .btn {

            }

        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
            height: 100%;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>

            { text: "Temperance is simply a disposition of the mind which binds the passions.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "Justice is a certain rectitude of mind whereby a man does what he ought to do in the circumstances confronting him.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "Courage is a mean with regard to fear and confidence.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "The principal act of courage is to endure and withstand dangers doggedly rather than to attack them.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "Moral virtue is a habit of choosing the mean as determined by reason.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "Prudence is right reason applied to action.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "The things of this world attract us only when they are presented as good; reason alone can tell us when they are truly good.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "If a lion could speak, we could not understand him—but a saint who speaks, we should obey.", source: "Catholic Reflection", type: "teaching" },
            { text: "Virtue is a habit that enables a man to live according to right reason.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "We do not know a truth without knowing its cause.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "The highest manifestation of life consists in this: that a being governs its own actions.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "It is requisite for the relaxation of the mind that we make use, from time to time, of playful deeds and jokes.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "How can we live in harmony? First we need to know we are all madly in love with the same God.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "For pride is a kind of usurpation of what belongs to God.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "The more one is united to God, the more one is united to other men.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "Man cannot live without joy; therefore when he is deprived of true spiritual joys it is necessary that he become addicted to carnal pleasures.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "By nature all men are equal in liberty, but not in other endowments.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "Well-ordered self-love is right and natural.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "Charity is friendship of man for God.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "There is nothing on this earth more to be prized than true friendship.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "Law is nothing other than a certain ordinance of reason for the common good.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "If you are looking for the way by which you should go, take Christ, because He Himself is the way.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "Sorrow can be alleviated by good sleep, a bath and a glass of wine.", source: "Saint Thomas Aquinas", type: "saint" },
            { text: "Not everything that is more difficult is more meritorious.", source: "Saint Thomas Aquinas", type: "saint" },
            // 121-150: Fatherhood, Marriage & Family
            { text: "A man who loves his wife loves Christ's Church, and that is his greatest earthly vocation.", source: "Ephesians 5:25", type: "teaching" },
            { text: "Fatherhood is the highest calling a man can have after his relationship with God.", source: "Catholic Teaching", type: "teaching" },
            { text: "Your children are not your possession; they are gifts from God entrusted to your care.", source: "Catholic Teaching", type: "teaching" },
            { text: "Lead your family in prayer. This is your most important duty as a husband and father.", source: "Catholic Teaching", type: "teaching" },
            { text: "Marriage is not just a contract; it is a covenant. Treat it as sacred.", source: "Catholic Teaching", type: "teaching" },
            { text: "Fathers, do not provoke your children, lest they become discouraged.", source: "Colossians 3:21", type: "verse" },
            { text: "Honor your father and your mother, as the Lord your God commanded you.", source: "Deuteronomy 5:16", type: "verse" },
            { text: "Behold, children are a heritage from the Lord, the fruit of the womb a reward.", source: "Psalm 127:3", type: "verse" },
            { text: "Train up a child in the way he should go; even when he is old he will not depart from it.", source: "Proverbs 22:6", type: "verse" },
            { text: "Husbands, love your wives, just as Christ loved the Church and gave himself up for her.", source: "Ephesians 5:25", type: "verse" },
            { text: "A good man leaves an inheritance for his children's children.", source: "Proverbs 13:22", type: "verse" },
            { text: "The righteous man walks in his integrity—blessed are his children after him.", source: "Proverbs 20:7", type: "verse" },
            { text: "If you want to know a man's character, watch how he treats his wife in private.", source: "Catholic Wisdom", type: "teaching" },
            { text: "A father who prays with his family raises children who know where to turn in trouble.", source: "Catholic Teaching", type: "teaching" },
            { text: "The family that prays together stays together.", source: "Father Patrick Peyton", type: "saint" },
            { text: "Man is never so tall as when he kneels to pray beside his children.", source: "Catholic Reflection", type: "teaching" },
            { text: "A man's greatest gift to his children is to love their mother well.", source: "Catholic Wisdom", type: "teaching" },
            { text: "Do not let the sun go down while you are still angry.", source: "Ephesians 4:26", type: "verse" },
            { text: "Love is patient, love is kind. It does not envy, it does not boast, it is not proud.", source: "1 Corinthians 13:4", type: "verse" },
            { text: "If I speak in the tongues of men or of angels, but do not have love, I am only a resounding gong.", source: "1 Corinthians 13:1", type: "verse" },
            { text: "And now these three remain: faith, hope and love. But the greatest of these is love.", source: "1 Corinthians 13:13", type: "verse" },
            { text: "Above all, love each other deeply, because love covers over a multitude of sins.", source: "1 Peter 4:8", type: "verse" },
            { text: "Place your family under the patronage of the Holy Family of Nazareth.", source: "Catholic Teaching", type: "teaching" },
            { text: "Saint Joseph said nothing that is recorded—yet his actions spoke louder than any words.", source: "Catholic Reflection", type: "teaching" },
            { text: "Joseph was a just man—and justice means doing what God asks, no matter the cost.", source: "Catholic Reflection", type: "teaching" },
            { text: "Work, like Saint Joseph, with your hands and your heart for the good of your family.", source: "Catholic Teaching", type: "teaching" },
            { text: "Be the kind of man your son wants to grow up to be.", source: "Catholic Reflection", type: "teaching" },
            { text: "Be the kind of man your daughter expects her future husband to be.", source: "Catholic Reflection", type: "teaching" },
            { text: "Impress God's commandments on your children. Talk about them when you sit at home and when you walk along the road.", source: "Deuteronomy 6:7", type: "verse" },
            { text: "He who spares the rod hates his son, but he who loves him is careful to discipline him.", source: "Proverbs 13:24", type: "verse" },
            // 151-180: War, Sacrifice & Martyrdom
            { text: "Fight the good fight of the faith.", source: "1 Timothy 6:12", type: "verse" },
            { text: "For our struggle is not against flesh and blood, but against the rulers, against the authorities, against the powers of this dark world.", source: "Ephesians 6:12", type: "verse" },
            { text: "A soldier of Christ needs no other weapons than prayer and virtue.", source: "Saint John Chrysostom", type: "saint" },
            { text: "The martyrs were not afraid because they had already given their lives to God before the executioner demanded them.", source: "Catholic Reflection", type: "teaching" },
            { text: "It is better to die on your feet than to live on your knees—for a cause worthy of God.", source: "Catholic Teaching", type: "teaching" },
            { text: "No one takes my life from me, but I lay it down of my own accord.", source: "John 10:18", type: "verse" },
            { text: "The blood of the martyrs is the seed of the Church.", source: "Tertullian", type: "saint" },
            { text: "Greater is he who conquers himself than he who conquers a city.", source: "Proverbs 16:32", type: "verse" },
            { text: "He who overcomes his passions overcomes his greatest enemies.", source: "Saint John Climacus", type: "saint" },
            { text: "The true soldier fights not because he hates what is in front of him, but because he loves what is behind him.", source: "G.K. Chesterton", type: "saint" },
            { text: "A man who won't die for something is not fit to live.", source: "Catholic Reflection", type: "teaching" },
            { text: "Blessed are those who are persecuted for righteousness sake, for theirs is the kingdom of heaven.", source: "Matthew 5:10", type: "verse" },
            { text: "For what will it profit a man if he gains the whole world and forfeits his soul?", source: "Matthew 16:26", type: "verse" },
            { text: "Take up your cross and follow me. No man is worthy of me who loves father or mother more than me.", source: "Matthew 10:38", type: "verse" },
            { text: "He who does not carry his cross and come after me cannot be my disciple.", source: "Luke 14:27", type: "verse" },
            { text: "For to me, to live is Christ and to die is gain.", source: "Philippians 1:21", type: "verse" },
            { text: "I count everything as loss because of the surpassing worth of knowing Christ Jesus my Lord.", source: "Philippians 3:8", type: "verse" },
            { text: "Through many tribulations we must enter the kingdom of God.", source: "Acts 14:22", type: "verse" },
            { text: "Consider it pure joy, my brothers and sisters, whenever you face trials of many kinds.", source: "James 1:2", type: "verse" },
            { text: "Suffering produces endurance, and endurance produces character, and character produces hope.", source: "Romans 5:3-4", type: "verse" },
            { text: "The cross is the key to heaven, and the man who bears it patiently holds that key in his hands.", source: "Catholic Teaching", type: "teaching" },
            { text: "You are a Christian only so long as you look forward to a new world. A comfortable religion is no religion at all.", source: "Saint Francis de Sales", type: "saint" },
            { text: "God is able to make all grace abound to you, so that having all sufficiency in all things at all times, you may abound in every good work.", source: "2 Corinthians 9:8", type: "verse" },
            { text: "The servant of God must expect to be tried in fire; if he cannot endure it, he is not worthy of God.", source: "Saint John Chrysostom", type: "saint" },
            { text: "Do not pray for easy lives. Pray to be stronger men.", source: "Saint Francis de Sales", type: "saint" },
            { text: "The saints were not men who never fell; they were men who never stayed down.", source: "Catholic Wisdom", type: "teaching" },
            { text: "Every saint has a past, and every sinner has a future.", source: "Catholic Wisdom", type: "teaching" },
            { text: "The true test of a man's character is what he does when no one is watching.", source: "Catholic Teaching", type: "teaching" },
            { text: "A man who fears God fears nothing else. A man who does not fear God fears everything else.", source: "Catholic Wisdom", type: "teaching" },
            { text: "He who lives without prayer lives without God, and he who lives without God lives without life.", source: "Saint Leonard of Port Maurice", type: "saint" },
            // 181-210: Virtue & Character
            { text: "Pride is the root of all sin. Humility is the foundation of all virtue.", source: "Catholic Teaching", type: "teaching" },
            { text: "Greed will never satisfy you. True wealth is in faith and family.", source: "Catholic Teaching", type: "teaching" },
            { text: "Lust is a sin against your body and against your spouse. Guard your heart and mind.", source: "Catholic Teaching", type: "teaching" },
            { text: "Temperance is strength. It means controlling your appetites for the sake of your soul.", source: "Catholic Teaching", type: "teaching" },
            { text: "Wrath is a sin that destroys relationships and your peace. Master your anger.", source: "Catholic Teaching", type: "teaching" },
            { text: "Sloth is not just physical laziness—it is a sluggishness of the soul toward the good.", source: "Catholic Teaching", type: "teaching" },
            { text: "Envy will poison your soul. Rejoice in the good fortune of others.", source: "Catholic Teaching", type: "teaching" },
            { text: "Fortitude enables a man to do what is good despite difficulty and danger.", source: "Catechism of the Catholic Church", type: "teaching" },
            { text: "Prudence is the charioteer of the virtues—it guides all the others.", source: "Catechism of the Catholic Church", type: "teaching" },
            { text: "Justice is the firm and constant will to give God and neighbor their due.", source: "Catechism of the Catholic Church", type: "teaching" },
            { text: "A virtuous man does not wait to be told what is right. He already knows.", source: "Catholic Reflection", type: "teaching" },
            { text: "Chastity is not the absence of desire but the mastery of it.", source: "Catholic Teaching", type: "teaching" },
            { text: "Obedience to God is the highest form of freedom.", source: "Catholic Teaching", type: "teaching" },
            { text: "A man of integrity is worth more than a city of talented cowards.", source: "Catholic Reflection", type: "teaching" },
            { text: "The first step to wisdom is admitting what you do not know.", source: "Socratic-Catholic Reflection", type: "teaching" },
            { text: "Simplicity is not poverty of mind, but clarity of purpose.", source: "Catholic Wisdom", type: "teaching" },
            { text: "Detachment from earthly things is not indifference to them, but freedom from slavery to them.", source: "Catholic Teaching", type: "teaching" },
            { text: "The man who mortifies himself today will thank himself in eternity.", source: "Catholic Teaching", type: "teaching" },
            { text: "Silence is the great teacher, and to learn its lessons you must pay attention.", source: "Desert Fathers", type: "saint" },
            { text: "The first task of a man is to conquer himself, then he can begin to serve others.", source: "Desert Fathers", type: "saint" },
            { text: "A word fitly spoken is like apples of gold in a setting of silver.", source: "Proverbs 25:11", type: "verse" },
            { text: "Like a city whose walls are broken through is a person who lacks self-control.", source: "Proverbs 25:28", type: "verse" },
            { text: "Whoever walks in integrity walks securely, but whoever takes crooked paths will be found out.", source: "Proverbs 10:9", type: "verse" },
            { text: "Righteousness exalts a nation, but sin condemns any people.", source: "Proverbs 14:34", type: "verse" },
            { text: "A lying tongue hates those it hurts, and a flattering mouth works ruin.", source: "Proverbs 26:28", type: "verse" },
            { text: "The fear of the Lord leads to life; then one rests content, untouched by trouble.", source: "Proverbs 19:23", type: "verse" },
            { text: "Better is a little with righteousness than great revenues with injustice.", source: "Proverbs 16:8", type: "verse" },
            { text: "By humility and the fear of the Lord are riches and honor and life.", source: "Proverbs 22:4", type: "verse" },
            { text: "One who is wise is mightier than one who is strong, and a man of knowledge than one of great strength.", source: "Proverbs 24:5", type: "verse" },
            { text: "Whoever trusts in his own mind is a fool, but he who walks in wisdom will be delivered.", source: "Proverbs 28:26", type: "verse" },
            // 211-240: Saints on the Interior Life
            { text: "The more you know God, the less you know yourself—and the more you know yourself, the more you need God.", source: "Saint Francis of Assisi", type: "saint" },
            { text: "Preach the Gospel at all times. When necessary, use words.", source: "Saint Francis of Assisi", type: "saint" },
            { text: "Start by doing what is necessary; then do what is possible; and suddenly you are doing the impossible.", source: "Saint Francis of Assisi", type: "saint" },
            { text: "Lord, make me an instrument of your peace. Where there is hatred, let me sow love.", source: "Saint Francis of Assisi", type: "saint" },
            { text: "It is in giving that we receive; it is in pardoning that we are pardoned.", source: "Saint Francis of Assisi", type: "saint" },
            { text: "A man must commit himself totally to God, or he commits himself to nothing worth committing to.", source: "Catholic Reflection", type: "teaching" },
            { text: "We become what we love, and who we love shapes what we become.", source: "Saint Clare of Assisi", type: "saint" },
            { text: "Virtue is not for the weak-willed. It demands everything and gives back everything.", source: "Catholic Teaching", type: "teaching" },
            { text: "Do not be afraid. Do not be satisfied with mediocrity. Put out into the deep.", source: "Saint John Paul II", type: "saint" },
            { text: "Do not abandon yourselves to despair. We are the Easter people and hallelujah is our song.", source: "Saint John Paul II", type: "saint" },
            { text: "Freedom consists not in doing what we like, but in having the right to do what we ought.", source: "Saint John Paul II", type: "saint" },
            { text: "The future starts today, not tomorrow.", source: "Saint John Paul II", type: "saint" },
            { text: "Do not be afraid. Open wide the doors for Christ.", source: "Saint John Paul II", type: "saint" },
            { text: "Man always travels along precipices. His truest obligation is to keep his balance.", source: "Saint John Paul II", type: "saint" },
            { text: "Stupidity is also a gift of God, but one mustn't misuse it.", source: "Saint John Paul II", type: "saint" },
            { text: "A person's rightful due is to be treated as an object of love, not as an object for use.", source: "Saint John Paul II", type: "saint" },
            { text: "The worst prison would be a closed heart.", source: "Saint John Paul II", type: "saint" },
            { text: "Every man is given a task. Do it well. Let God judge the greatness of it.", source: "Catholic Reflection", type: "teaching" },
            { text: "A saint is not someone who never sins, but someone who sins and rises and keeps going toward God.", source: "Catholic Wisdom", type: "teaching" },
            { text: "Holiness is not reserved for priests and nuns; every man is called to sanctity.", source: "Catholic Teaching", type: "teaching" },
            { text: "Confession is not weakness; it is the greatest act of courage—to admit you need God.", source: "Catholic Teaching", type: "teaching" },
            { text: "The Eucharist is not a reward for the perfect, but medicine for the sick. Come humbly.", source: "Catholic Teaching", type: "teaching" },
            { text: "Prayer is the raising of one's mind and heart to God.", source: "Catechism of the Catholic Church", type: "teaching" },
            { text: "A man who does not pray is a man who relies on himself—and that is the most dangerous thing of all.", source: "Catholic Reflection", type: "teaching" },
            { text: "The Rosary is the most powerful weapon we have against the devil.", source: "Blessed Alan de la Roche", type: "saint" },
            { text: "Give me an army saying the Rosary and I will conquer the world.", source: "Blessed Pope Pius IX", type: "saint" },
            { text: "Never be afraid of loving the Blessed Virgin too much. You can never love her more than Jesus did.", source: "Saint Maximilian Kolbe", type: "saint" },
            { text: "The man who does not pray has already given the devil victory.", source: "Catholic Teaching", type: "teaching" },
            { text: "To work is to pray. Ora et Labora—pray and work.", source: "Saint Benedict", type: "saint" },
            { text: "Idleness is the enemy of the soul. Stay occupied with work pleasing to God.", source: "Saint Benedict", type: "saint" },
            // 241-270: Work & Excellence
            { text: "A man who works with his hands is a laborer. A man who works with his hands and his brain is a craftsman. A man who works with his hands, his brain, and his heart is an artist.", source: "Saint Francis of Assisi", type: "saint" },
            { text: "Excellence is not an act but a habit. The same is true of virtue.", source: "Catholic Reflection", type: "teaching" },
            { text: "Whatever your task, work heartily, as serving the Lord and not men.", source: "Colossians 3:23", type: "verse" },
            { text: "He who works his land will have abundant food, but he who chases fantasies lacks judgment.", source: "Proverbs 12:11", type: "verse" },
            { text: "All hard work brings a profit, but mere talk leads only to poverty.", source: "Proverbs 14:23", type: "verse" },
            { text: "The soul of the sluggard craves and gets nothing, while the soul of the diligent is richly supplied.", source: "Proverbs 13:4", type: "verse" },
            { text: "Wealth gained hastily will dwindle, but whoever gathers little by little will increase it.", source: "Proverbs 13:11", type: "verse" },
            { text: "Go to the ant, you sluggard! Consider her ways and be wise.", source: "Proverbs 6:6", type: "verse" },
            { text: "Do not love sleep, lest you come to poverty; open your eyes, and you will have plenty of bread.", source: "Proverbs 20:13", type: "verse" },
            { text: "The hand of the diligent will rule, while the slothful will be put to forced labor.", source: "Proverbs 12:24", type: "verse" },
            { text: "Seize the day—not for pleasure, but for service to God and neighbor.", source: "Catholic Wisdom", type: "teaching" },
            { text: "A man who builds on sand builds for himself. A man who builds on Christ builds for eternity.", source: "Matthew 7:24-26", type: "verse" },
            { text: "The wise man builds his house upon the rock; when the rains and winds come, it stands firm.", source: "Matthew 7:25", type: "verse" },
            { text: "Man was created to work. Work is not a punishment—it is a participation in God's creation.", source: "Catholic Teaching", type: "teaching" },
            { text: "Work with your hands, just as we told you, so that your daily life may win the respect of outsiders.", source: "1 Thessalonians 4:11-12", type: "verse" },
            { text: "The one who is not willing to work shall not eat.", source: "2 Thessalonians 3:10", type: "verse" },
            { text: "Do not grow weary in doing good, for in due season you will reap, if you do not give up.", source: "Galatians 6:9", type: "verse" },
            { text: "Let each of you look not only to his own interests, but also to the interests of others.", source: "Philippians 2:4", type: "verse" },
            { text: "Each one should use whatever gift he has received to serve others.", source: "1 Peter 4:10", type: "verse" },
            { text: "Work to live, live to serve, serve to glorify—this is the Catholic man's cycle.", source: "Catholic Reflection", type: "teaching" },
            { text: "A man of faith is not passive. He acts, he builds, he defends, he sacrifices.", source: "Catholic Teaching", type: "teaching" },
            { text: "The Catholic man is not a monk who retreats from the world, but a knight who enters it with God.", source: "Catholic Reflection", type: "teaching" },
            { text: "Excellence honors God. Mediocrity insults him. Give your best in all things.", source: "Catholic Teaching", type: "teaching" },
            { text: "The man who masters his time masters himself.", source: "Catholic Wisdom", type: "teaching" },
            { text: "Rise early. Pray. Work. The day belongs to God and to those who honor him.", source: "Desert Fathers", type: "saint" },
            { text: "A man who wastes time wastes the most precious gift God has given him.", source: "Catholic Reflection", type: "teaching" },
            { text: "God does not demand success. He demands faithfulness.", source: "Saint Mother Teresa of Calcutta", type: "saint" },
            { text: "We ourselves feel that what we are doing is just a drop in the ocean. But the ocean would be less because of that missing drop.", source: "Saint Mother Teresa of Calcutta", type: "saint" },
            { text: "If you are humble, nothing will touch you, neither praise nor disgrace, because you know what you are.", source: "Saint Mother Teresa of Calcutta", type: "saint" },
            { text: "Yesterday is gone. Tomorrow has not yet come. We have only today. Let us begin.", source: "Saint Mother Teresa of Calcutta", type: "saint" },
            // 271-300: Brotherhood & Community
            { text: "Two are better than one, for they have a good reward for their toil.", source: "Ecclesiastes 4:9", type: "verse" },
            { text: "If either of them falls down, one can help the other up. But pity anyone who falls and has no one to help them up.", source: "Ecclesiastes 4:10", type: "verse" },
            { text: "A friend loves at all times, and a brother is born for a time of adversity.", source: "Proverbs 17:17", type: "verse" },
            { text: "Wounds from a friend can be trusted, but an enemy multiplies kisses.", source: "Proverbs 27:6", type: "verse" },
            { text: "Walk with the wise and become wise, for a companion of fools suffers harm.", source: "Proverbs 13:20", type: "verse" },
            { text: "Bad company corrupts good character.", source: "1 Corinthians 15:33", type: "verse" },
            { text: "Do not forsake your friend or a friend of your family.", source: "Proverbs 27:10", type: "verse" },
            { text: "A man of many companions may come to ruin, but there is a friend who sticks closer than a brother.", source: "Proverbs 18:24", type: "verse" },
            { text: "Brothers, if someone is caught in a sin, you who live by the Spirit should restore that person gently.", source: "Galatians 6:1", type: "verse" },
            { text: "Carry each other's burdens, and in this way you will fulfill the law of Christ.", source: "Galatians 6:2", type: "verse" },
            { text: "Encourage one another and build each other up.", source: "1 Thessalonians 5:11", type: "verse" },
            { text: "Let us consider how we may spur one another on toward love and good deeds.", source: "Hebrews 10:24", type: "verse" },
            { text: "Do not neglect to meet together, as is the habit of some, but encourage one another.", source: "Hebrews 10:25", type: "verse" },
            { text: "A man without brothers is like a soldier without comrades—vulnerable and isolated.", source: "Catholic Reflection", type: "teaching" },
            { text: "Iron Catholic men make iron Catholic communities. Build your circle with care.", source: "Catholic Teaching", type: "teaching" },
            { text: "The Church is not a hotel for saints—it is a hospital for sinners. Come as you are.", source: "Catholic Reflection", type: "teaching" },
            { text: "Confess your sins to each other and pray for each other so that you may be healed.", source: "James 5:16", type: "verse" },
            { text: "If your brother sins against you, go and tell him his fault, between you and him alone.", source: "Matthew 18:15", type: "verse" },
            { text: "Forgive as the Lord forgave you.", source: "Colossians 3:13", type: "verse" },
            { text: "Bear with each other and forgive one another if any of you has a grievance against someone.", source: "Colossians 3:13", type: "verse" },
            { text: "Be kind and compassionate to one another, forgiving each other, just as in Christ God forgave you.", source: "Ephesians 4:32", type: "verse" },
            { text: "A real man forgives quickly. Holding grudges is for boys.", source: "Catholic Wisdom", type: "teaching" },
            { text: "Love your enemies and pray for those who persecute you.", source: "Matthew 5:44", type: "verse" },
            { text: "If you love those who love you, what reward will you get? Even tax collectors do that.", source: "Matthew 5:46", type: "verse" },
            { text: "Bless those who persecute you; bless and do not curse.", source: "Romans 12:14", type: "verse" },
            { text: "Do not repay evil with evil or insult with insult. On the contrary, repay evil with blessing.", source: "1 Peter 3:9", type: "verse" },

        let deferredPrompt = null;

        // ============================================
        // Initialize
        // ============================================
        function init() {
            updateTime();
            loadTodayQuote();
            setupInstallPrompt();
            registerServiceWorker();
            
            // Update time every second
            setInterval(updateTime, 1000);
            
            // Check for quote update at midnight
            checkMidnightUpdate();
        }

        // ============================================
        // Time Management
        // ============================================
        function updateTime() {
            const now = new Date();
            
            // Format time
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `${hours}:${minutes}`;
            
            // Format date
            const dateOptions = { weekday: 'long', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('en-US', dateOptions);
            document.getElementById('dateDisplay').textContent = dateStr;
        }

        // ============================================
        // Quote Management
        // ============================================
        function getQuoteForDate(date) {
            // Deterministic quote selection based on date
            const dateStr = date.toDateString();
            const hash = dateStr.split('').reduce((acc, char) => {
                return acc * 31 + char.charCodeAt(0);
            }, 0);
            const index = Math.abs(hash) % QUOTE_DATABASE.length;
            return QUOTE_DATABASE[index];
        }

        function loadTodayQuote() {
            const today = new Date();
            const quote = getQuoteForDate(today);
            displayQuote(quote);
            
            // Get next day's quote
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const nextQuote = getQuoteForDate(tomorrow);
            
            document.getElementById('nextQuoteText').textContent = `"${nextQuote.text}"`;
        }

        function displayQuote(quote) {
            const quoteText = document.getElementById('quoteText');
            const quoteSource = document.getElementById('quoteSource');
            const quoteType = document.getElementById('quoteType');
            
            quoteText.classList.remove('fade-in');
            
            // Trigger reflow to restart animation
            void quoteText.offsetWidth;
            
            quoteText.textContent = `"${quote.text}"`;
            quoteSource.textContent = `— ${quote.source}`;
            
            const typeMap = {
                'verse': '📖 Bible Verse',
                'saint': '⛪ Saint Quote',
                'teaching': '✝ Catholic Teaching'
            };
            quoteType.textContent = typeMap[quote.type] || '';
            
            quoteText.classList.add('fade-in');
            
            // Save to localStorage
            localStorage.setItem('todayQuote', JSON.stringify({
                ...quote,
                date: new Date().toDateString()
            }));
        }

        // ============================================
        // AI Quote Generation
        // ============================================
        async function generateNewQuote() {
            const btn = document.getElementById('generateBtn');
            const btnIcon = document.getElementById('generateBtnIcon');
            const btnText = document.getElementById('generateBtnText');
            
            btn.disabled = true;
            btnIcon.innerHTML = '<span class="spinner"></span>';
            btnText.textContent = 'Generating...';
            
            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-6",
                        max_tokens: 200,
                        messages: [
                            {
                                role: "user",
                                content: "Generate ONE powerful, manly Catholic Bible verse or Saint quote for men. Format: Quote text on first line, then on next line: Source (Bible reference or Saint name). Make it bold, action-oriented, and emphasize courage, faith, virtue, or strength. No commentary, just the quote and source."
                            }
                        ],
                    })
                });

                const data = await response.json();
                const generatedText = data.content[0]?.text || '';
                const lines = generatedText.split('\n').map(s => s.trim()).filter(s => s);
                
                if (lines.length >= 2) {
                    const quote = {
                        text: lines[0].replace(/^[""]|[""]$/g, ''),
                        source: lines[1],
                        type: 'generated'
                    };
                    displayQuote(quote);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error generating quote. Please try again.');
            } finally {
                btn.disabled = false;
                btnIcon.innerHTML = '✨';
                btnText.textContent = 'Generate AI Quote';
            }
        }

        // ============================================
        // Share Functionality
        // ============================================
        function shareQuote() {
            const quoteText = document.getElementById('quoteText').textContent;
            const quoteSource = document.getElementById('quoteSource').textContent;
            const shareText = `${quoteText}\n\n${quoteSource}\n\n📱 From Catholic Daily Virtue\nhttps://your-github.github.io/catholic-daily-virtue`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Catholic Daily Virtue',
                    text: shareText,
                });
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(shareText).then(() => {
                    alert('Quote copied to clipboard!');
                }).catch(() => {
                    alert(shareText);
                });
            }
        }

        // ============================================
        // PWA Installation
        // ============================================
        function setupInstallPrompt() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                document.getElementById('installPrompt').classList.remove('hidden');
            });

            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                document.getElementById('installPrompt').classList.add('hidden');
            });
        }

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        deferredPrompt = null;
                        document.getElementById('installPrompt').classList.add('hidden');
                    }
                });
            }
        }

        // ============================================
        // Service Worker
        // ============================================
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('Service Worker registration failed:', err);
                });
            }
        }

        // ============================================
        // Midnight Update Check
        // ============================================
        function checkMidnightUpdate() {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(0, 0, 0, 0);
            
            const timeUntilMidnight = tomorrow - now;
            
            setTimeout(() => {
                loadTodayQuote();
                checkMidnightUpdate(); // Reschedule for next midnight
            }, timeUntilMidnight);
        }

        // Start the app
        document.addEventListener('DOMContentLoaded', init);
    </script>
